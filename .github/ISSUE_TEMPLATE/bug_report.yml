name: Bug report
description: Report a reproducible problem in the code, validation, or scoring.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve HumanAI-Impact-Bench. Do not include private conversations or personal data.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the command and a minimal non-sensitive input where possible.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HumanAI-Impact-Bench version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add relevant logs after removing secrets and personal data.
