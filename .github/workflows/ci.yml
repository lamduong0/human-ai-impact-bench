name: HumanAI-Impact-Bench CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Validate benchmark scenarios
        run: |
          humanai-impact-bench validate data/scenarios/v0.1/en.jsonl
          humanai-impact-bench validate data/scenarios/v0.1/vi.jsonl

      - name: Score example annotations
        run: humanai-impact-bench score examples/annotations.jsonl --pretty
